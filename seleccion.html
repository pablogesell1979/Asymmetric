<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selección de Facciones - Legado Asimétrico</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background-color: #0b0c10; color: #c5c6c7;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; padding: 15px;
        }
        .contenedor {
            background-color: #1a1d24; padding: 25px 20px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7); border: 2px solid #c5a059;
            text-align: center; 
            width: 100%;
            max-width: 700px;
        }
        .logo { 
            width: 100%; 
            max-width: 350px; 
            height: auto; 
            margin-bottom: 20px; 
        }
        
        .panel-tiempo {
            background-color: #0b0c10; padding: 15px; border-radius: 8px;
            border: 1px solid #454a52; margin-bottom: 25px;
        }
        .panel-tiempo h3 { margin: 0 0 10px 0; font-size: 1.1rem; color: #c5a059; }
        .opciones-tiempo { 
            display: flex; 
            justify-content: center; 
            flex-wrap: wrap; 
            gap: 15px; 
            font-size: 0.95rem; 
        }
        .opciones-tiempo label { 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 6px; 
            transition: color 0.2s;
            padding: 5px 10px;
            background: #15171c;
            border-radius: 6px;
            border: 1px solid #2a2d34;
        }
        .opciones-tiempo input[type="radio"] {
            transform: scale(1.2);
            margin: 0;
        }
        .opciones-tiempo label:hover { color: #fff; border-color: #c5a059; }
        
        .area-seleccion { 
            display: flex; 
            flex-direction: row; 
            justify-content: space-between; 
            align-items: stretch; 
            gap: 20px; 
            margin-bottom: 20px; 
        }
        .columna { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            width: 100%;
        }
        
        .caja-control {
            background-color: #0f1116; padding: 10px 12px; border-radius: 6px;
            border: 1px solid #333; display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 5px;
        }
        .caja-control label { font-size: 0.9rem; font-weight: bold; color: #c5a059; }
        .select-control {
            width: 140px !important; padding: 6px 10px !important; font-size: 0.9rem !important;
            background-color: #1a1d24 !important; border-color: #c5a059 !important;
        }

        .vista-previa { 
            width: 100%; height: 260px; background-color: #0b0c10; 
            border: 2px solid #333; border-radius: 8px; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .vista-previa img { max-width: 100%; max-height: 100%; object-fit: contain; }

        select {
            width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #454a52;
            background-color: #0b0c10; color: #fff; font-size: 1rem; cursor: pointer;
            outline: none;
        }
        select:focus { border-color: #c5a059; }
        
        .info-faccion {
            background-color: #22252a; border: 1px solid #333; border-radius: 6px;
            padding: 12px; font-size: 0.85rem; text-align: left; min-height: 110px;
            color: #bdc3c7; display: flex; flex-direction: column; gap: 6px;
            flex-grow: 1;
        }
        .info-faccion strong { color: #f1c40f; }
        .info-derrota { color: #e74c3c !important; font-weight: bold; }

        .vs-texto {
            font-size: 2rem; color: #c5a059; font-weight: bold; align-self: center;
            padding: 10px 0;
        }

        .btn-iniciar {
            width: 100%; padding: 16px; font-size: 1.2rem; margin-top: 10px;
            background-color: #2ecc71; color: white; border: none; border-radius: 8px;
            cursor: pointer; font-weight: bold; transition: background 0.2s;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
        }
        .btn-iniciar:hover, .btn-iniciar:active { background-color: #27ae60; }

        /* --- ADAPTACIÓN RESPONSIVA PARA CELULARES --- */
        @media (max-width: 768px) {
            body { padding: 10px; justify-content: flex-start; }
            .contenedor { padding: 15px; border-width: 1px; }
            .logo { max-width: 260px; margin-bottom: 15px; }
            
            .area-seleccion {
                flex-direction: column;
                gap: 15px;
            }
            .vs-texto {
                font-size: 1.5rem;
                background: #0b0c10;
                width: 100%;
                border-radius: 6px;
                border: 1px dashed #333;
                padding: 5px 0;
            }
            .vista-previa { height: 200px; }
            .info-faccion { min-height: auto; }
            .opciones-tiempo { gap: 8px; }
            .opciones-tiempo label { flex: 1; justify-content: center; font-size: 0.85rem; padding: 8px 4px; }
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <!-- Logo con detección automática de extensión -->
        <img src="LogoSolo.PNG" alt="Legado Asymmetric Chess" class="logo" onerror="corregirExtension(this)">

        <!-- PANEL DE TIEMPO -->
        <div class="panel-tiempo">
            <h3>Control de Tiempo</h3>
            <div class="opciones-tiempo">
                <label><input type="radio" name="tiempo" value="2"> Bullet (2 min)</label>
                <label><input type="radio" name="tiempo" value="4"> Blitz (4 min)</label>
                <label><input type="radio" name="tiempo" value="6" checked> Normal (6 min)</label>
            </div>
        </div>

        <div class="area-seleccion">
            <!-- Jugador 1 -->
            <div class="columna">
                <div class="caja-control">
                    <label>Control:</label>
                    <select id="j1-control" class="select-control">
                        <option value="HUMANO">👤 Humano</option>
                        <option value="CPU">🤖 CPU (IA)</option>
                    </select>
                </div>

                <label style="font-weight: bold; color: #c5a059;">Jugador 1 (Abajo)</label>
                <!-- Imagen con detección automática de extensión -->
                <div class="vista-previa"><img id="img-j1" src="SelectMago1.PNG" alt="J1" onerror="corregirExtension(this)"></div>
                <select id="fac-j1" onchange="actualizarImagen(1)">
                    <option value="Mago">Magos</option>
                    <option value="Elfo">Elfos</option>
                    <option value="Humano">Humanos</option>
                    <option value="Coloso">Colosos</option>
                </select>
                <!-- INFO DINÁMICA J1 -->
                <div class="info-faccion" id="info-j1"></div>
            </div>

            <div class="vs-texto">VS</div>

            <!-- Jugador 2 -->
            <div class="columna">
                <div class="caja-control">
                    <label>Control:</label>
                    <select id="j2-control" class="select-control">
                        <option value="HUMANO">👤 Humano</option>
                        <option value="CPU">🤖 CPU (IA)</option>
                    </select>
                </div>

                <label style="font-weight: bold; color: #c5a059;">Jugador 2 (Arriba)</label>
                <!-- Imagen con detección automática de extensión -->
                <div class="vista-previa"><img id="img-j2" src="SelectMago2.PNG" alt="J2" onerror="corregirExtension(this)"></div>
                <select id="fac-j2" onchange="actualizarImagen(2)">
                    <option value="Mago">Magos</option>
                    <option value="Elfo">Elfos</option>
                    <option value="Humano">Humanos</option>
                    <option value="Coloso">Colosos</option>
                </select>
                <!-- INFO DINÁMICA J2 -->
                <div class="info-faccion" id="info-j2"></div>
            </div>
        </div>

        <button class="btn-iniciar" onclick="iniciarPartida()">Iniciar Partida</button>
    </div>

    <script>
        const datosFacciones = {
            'Mago': {
                pros: "Pueden lanzar conjuros poderosos, crear muros y teletransportarse.",
                contras: "Tienen poca movilidad base y son pocas piezas.",
                derrota: "Pierden al morir los Grandes Magos (Fuego y Hielo)."
            },
            'Elfo': {
                pros: "Alta movilidad, ataques a distancia y pueden revivir aliados caídos.",
                contras: "Dependen de la posición de sus árboles para protegerse.",
                derrota: "Pierden si su Árbol Sagrado es destruido."
            },
            'Humano': {
                pros: "Evolucionan cada 3 turnos, volviéndose extremadamente poderosos.",
                contras: "Inician muy débiles (movimiento de 1 casilla) y vulnerables.",
                derrota: "Pierden si el Comandante muere."
            },
            'Coloso': {
                pros: "Mucha movilidad, su torso no puede ser destruido y lanza piedras.",
                contras: "Movimiento rígido, requiere que sus partes se mantengan juntas.",
                derrota: "Pierde cuando eliminan todas sus extremidades."
            }
        };

        // Sistema de auto-recuperación de imágenes para servidores Linux (GitHub Pages)
        function corregirExtension(img) {
            if (!img.getAttribute('reintentado')) {
                img.setAttribute('reintentado', '1');
                if (img.src.endsWith('.PNG')) {
                    img.src = img.src.replace('.PNG', '.png');
                } else if (img.src.endsWith('.png')) {
                    img.src = img.src.replace('.png', '.PNG');
                } else if (img.src.endsWith('.JPG')) {
                    img.src = img.src.replace('.JPG', '.jpg');
                } else if (img.src.endsWith('.jpg')) {
                    img.src = img.src.replace('.jpg', '.JPG');
                }
            } else if (img.getAttribute('reintentado') === '1') {
                // Segundo reintento por si todo el nombre está en minúsculas (ej. selectmago1.png)
                img.setAttribute('reintentado', '2');
                let partes = img.src.split('/');
                let archivo = partes.pop().toLowerCase();
                img.src = partes.join('/') + '/' + archivo;
            }
        }

        function actualizarImagen(jugador) {
            const selector = document.getElementById(`fac-j${jugador}`);
            const imagen = document.getElementById(`img-j${jugador}`);
            const panelInfo = document.getElementById(`info-j${jugador}`);
            const faccion = selector.value;
            
            // Reseteamos el historial de reintentos para la nueva imagen
            imagen.removeAttribute('reintentado');
            imagen.src = `Select${faccion}${jugador}.PNG`;

            const info = datosFacciones[faccion];
            panelInfo.innerHTML = `
                <div><strong>Pros:</strong> ${info.pros}</div>
                <div><strong>Contras:</strong> ${info.contras}</div>
                <div class="info-derrota">Derrota: ${info.derrota}</div>
            `;
        }

        function iniciarPartida() {
            const j1 = document.getElementById('fac-j1').value.toLowerCase() + 's';
            const j2 = document.getElementById('fac-j2').value.toLowerCase() + 's';
            const tiempoSeleccionado = document.querySelector('input[name="tiempo"]:checked').value;

            const config = { 
                jugador1: j1, 
                jugador2: j2,
                tiempoMinutos: parseInt(tiempoSeleccionado),
                j1Tipo: document.getElementById('j1-control').value,
                j2Tipo: document.getElementById('j2-control').value
            };
            
            localStorage.setItem('configuracionPartida', JSON.stringify(config));
            window.location.href = 'tablero.html';
        }

        window.onload = function() {
            actualizarImagen(1);
            actualizarImagen(2);
        };
    </script>
</body>
</html>
