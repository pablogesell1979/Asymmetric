<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selección de Facciones - Legado Asimétrico</title>
    <style>
        body {
            background-color: #0b0c10; color: #c5c6c7;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; padding: 20px;
        }
        .contenedor {
            background-color: #1a1d24; padding: 30px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7); border: 2px solid #c5a059;
            text-align: center; width: 700px;
        }
        .logo { max-width: 400px; margin-bottom: 20px; }
        
        .panel-tiempo {
            background-color: #0b0c10; padding: 15px; border-radius: 8px;
            border: 1px solid #454a52; margin-bottom: 25px;
        }
        .panel-tiempo h3 { margin: 0 0 10px 0; font-size: 1.1rem; color: #c5a059; }
        .opciones-tiempo { display: flex; justify-content: center; gap: 20px; font-size: 1rem; }
        .opciones-tiempo label { cursor: pointer; display: flex; align-items: center; gap: 5px; transition: color 0.2s;}
        .opciones-tiempo label:hover { color: #fff; }
        
        .area-seleccion { display: flex; justify-content: space-between; align-items: flex-start; gap: 20px; margin-bottom: 20px; }
        .columna { flex: 1; display: flex; flex-direction: column; gap: 10px; width: 45%;}
        
        /* Contenedor especial para el tipo de mando (Humano vs CPU) */
        .caja-control {
            background-color: #0f1116; padding: 8px 12px; border-radius: 6px;
            border: 1px solid #333; display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 5px;
        }
        .caja-control label { font-size: 0.85rem; font-weight: bold; color: #c5a059; }
        .select-control {
            width: 130px !important; padding: 4px 8px !important; font-size: 0.85rem !important;
            background-color: #1a1d24 !important; border-color: #c5a059 !important;
        }

        .vista-previa { 
            width: 100%; height: 280px; background-color: #0b0c10; 
            border: 2px solid #333; border-radius: 8px; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .vista-previa img { max-width: 100%; max-height: 100%; object-fit: contain; }

        select {
            width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #454a52;
            background-color: #0b0c10; color: #fff; font-size: 1rem; cursor: pointer;
        }
        
        .info-faccion {
            background-color: #22252a; border: 1px solid #333; border-radius: 6px;
            padding: 12px; font-size: 0.85rem; text-align: left; min-height: 110px;
            color: #bdc3c7; display: flex; flex-direction: column; gap: 6px;
        }
        .info-faccion strong { color: #f1c40f; }
        .info-derrota { color: #e74c3c !important; font-weight: bold; }

        .btn-iniciar {
            width: 100%; padding: 15px; font-size: 1.2rem; margin-top: 10px;
            background-color: #2ecc71; color: white; border: none; border-radius: 6px;
            cursor: pointer; font-weight: bold; transition: background 0.2s;
        }
        .btn-iniciar:hover { background-color: #27ae60; }
    </style>
</head>
<body>

    <div class="contenedor">
        <img src="LogoSolo.PNG" alt="Legado Asymmetric Chess" class="logo">

        <!-- PANEL DE TIEMPO -->
        <div class="panel-tiempo">
            <h3>Control de Tiempo</h3>
            <div class="opciones-tiempo">
                <label><input type="radio" name="tiempo" value="2"> Bullet (2 min)</label>
                <label><input type="radio" name="tiempo" value="4"> Blitz (4 min)</label>
                <label><input type="radio" name="tiempo" value="6" checked> Normal (6 min)</label>
            </div>
        </div>

        <div class="area-seleccion">
            <!-- Jugador 1 -->
            <div class="columna">
                <div class="caja-control">
                    <label>Control:</label>
                    <select id="j1-control" class="select-control">
                        <option value="HUMANO">👤 Humano</option>
                        <option value="CPU">🤖 CPU (IA)</option>
                    </select>
                </div>

                <label style="font-weight: bold; color: #c5a059;">Jugador 1 (Abajo)</label>
                <div class="vista-previa"><img id="img-j1" src="SelectMago1.PNG" alt="J1"></div>
                <select id="fac-j1" onchange="actualizarImagen(1)">
                    <option value="Mago">Magos</option>
                    <option value="Elfo">Elfos</option>
                    <option value="Humano">Humanos</option>
                    <option value="Coloso">Colosos</option>
                </select>
                <!-- INFO DINÁMICA J1 -->
                <div class="info-faccion" id="info-j1"></div>
            </div>

            <div style="font-size: 2rem; color: #c5a059; font-weight: bold; align-self: center;">VS</div>

            <!-- Jugador 2 -->
            <div class="columna">
                <div class="caja-control">
                    <label>Control:</label>
                    <select id="j2-control" class="select-control">
                        <option value="HUMANO">👤 Humano</option>
                        <option value="CPU">🤖 CPU (IA)</option>
                    </select>
                </div>

                <label style="font-weight: bold; color: #c5a059;">Jugador 2 (Arriba)</label>
                <div class="vista-previa"><img id="img-j2" src="SelectMago2.PNG" alt="J2"></div>
                <select id="fac-j2" onchange="actualizarImagen(2)">
                    <option value="Mago">Magos</option>
                    <option value="Elfo">Elfos</option>
                    <option value="Humano">Humanos</option>
                    <option value="Coloso">Colosos</option>
                </select>
                <!-- INFO DINÁMICA J2 -->
                <div class="info-faccion" id="info-j2"></div>
            </div>
        </div>

        <button class="btn-iniciar" onclick="iniciarPartida()">Iniciar Partida</button>
    </div>

    <script>
        const datosFacciones = {
            'Mago': {
                pros: "Pueden lanzar conjuros poderosos, crear muros y teletransportarse.",
                contras: "Tienen poca movilidad base y son pocas piezas.",
                derrota: "Pierden al morir los Grandes Magos (Fuego y Hielo)."
            },
            'Elfo': {
                pros: "Alta movilidad, ataques a distancia y pueden revivir aliados caídos.",
                contras: "Dependen de la posición de sus árboles para protegerse.",
                derrota: "Pierden si su Árbol Sagrado es destruido."
            },
            'Humano': {
                pros: "Evolucionan cada 3 turnos, volviéndose extremadamente poderosos.",
                contras: "Inician muy débiles (movimiento de 1 casilla) y vulnerables.",
                derrota: "Pierden si el Comandante muere."
            },
            'Coloso': {
                pros: "Mucha movilidad, su torso no puede ser destruido y lanza piedras.",
                contras: "Movimiento rígido, requiere que sus partes se mantengan juntas.",
                derrota: "Pierde cuando eliminan todas sus extremidades."
            }
        };

        function actualizarImagen(jugador) {
            const selector = document.getElementById(`fac-j${jugador}`);
            const imagen = document.getElementById(`img-j${jugador}`);
            const panelInfo = document.getElementById(`info-j${jugador}`);
            const faccion = selector.value;
            
            imagen.src = `Select${faccion}${jugador}.PNG`;

            const info = datosFacciones[faccion];
            panelInfo.innerHTML = `
                <div><strong>Pros:</strong> ${info.pros}</div>
                <div><strong>Contras:</strong> ${info.contras}</div>
                <div class="info-derrota">Derrota: ${info.derrota}</div>
            `;
        }

        function iniciarPartida() {
            const j1 = document.getElementById('fac-j1').value.toLowerCase() + 's';
            const j2 = document.getElementById('fac-j2').value.toLowerCase() + 's';
            const tiempoSeleccionado = document.querySelector('input[name="tiempo"]:checked').value;

            // Objeto de configuración unificado y sin errores de sintaxis
            const config = { 
                jugador1: j1, 
                jugador2: j2,
                tiempoMinutos: parseInt(tiempoSeleccionado),
                j1Tipo: document.getElementById('j1-control').value,
                j2Tipo: document.getElementById('j2-control').value
            };
            
            localStorage.setItem('configuracionPartida', JSON.stringify(config));
            window.location.href = 'tablero.html';
        }

        window.onload = function() {
            actualizarImagen(1);
            actualizarImagen(2);
        };
    </script>
</body>
</html>
