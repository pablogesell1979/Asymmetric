<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Victoria! - Legado Asimétrico</title>
    <!-- Importamos una fuente épica para el texto de victoria -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0b0c10; color: #c5c6c7;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; padding: 20px; text-align: center;
            background-image: radial-gradient(circle at center, #1a1d24 0%, #0b0c10 100%);
        }
        .logo { max-width: 300px; margin-bottom: 10px; }
        
        .titulo-victoria {
            font-family: 'Cinzel', serif;
            font-size: 4rem;
            color: #c5a059;
            text-shadow: 0 0 20px rgba(197, 160, 89, 0.5);
            margin: 10px 0;
            letter-spacing: 2px;
        }

        .subtitulo {
            font-size: 1.5rem; color: #f39c12; margin-bottom: 20px;
        }

        .contenedor-imagen {
            width: 400px; height: 400px;
            background-color: #0b0c10;
            border: 3px solid #c5a059; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8), 0 0 20px rgba(197, 160, 89, 0.3);
            overflow: hidden; display: flex; align-items: center; justify-content: center;
            margin-bottom: 30px;
        }
        .contenedor-imagen img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .botones { display: flex; gap: 20px; }
        
        .btn {
            padding: 15px 30px; font-size: 1.1rem; border: none; border-radius: 6px;
            cursor: pointer; font-weight: bold; transition: all 0.2s; text-decoration: none;
        }
        .btn-menu { background-color: #3498db; color: white; }
        .btn-menu:hover { background-color: #2980b9; transform: scale(1.05); }
        .btn-descargar { background-color: #2ecc71; color: white; }
        .btn-descargar:hover { background-color: #27ae60; transform: scale(1.05); }
    </style>
</head>
<body>

    <img src="LogoSolo.PNG" alt="Legado Asymmetric Chess" class="logo">
    
    <h1 class="titulo-victoria">¡VICTORIA!</h1>
    <div class="subtitulo" id="texto-ganador">Cargando resultado...</div>

    <div class="contenedor-imagen">
        <img id="img-ganador" src="" alt="Faccion Ganadora">
    </div>

    <div class="botones">
        <a href="seleccion.html" class="btn btn-menu">Volver al Menú</a>
    </div>

    <script>
        let datosPartida = null;

        window.onload = function() {
            // Leemos los datos que nos mandó el tablero
            const datosGuardados = localStorage.getItem('resultadoPartida');
            if (datosGuardados) {
                datosPartida = JSON.parse(datosGuardados);
                
                // Actualizamos el texto
                document.getElementById('texto-ganador').innerText = 
                    `¡EL JUGADOR ${datosPartida.ganador} HA DOMINADO EL CAMPO DE BATALLA!`;
                
                // Actualizamos la imagen
                document.getElementById('img-ganador').src = datosPartida.imgGanador;
                
                // Forzamos la descarga automática del registro al cargar la página (opcional, podés quitar esta línea si prefieres que solo se baje al tocar el botón)
                setTimeout(descargarRegistro, 1000); 
            } else {
                document.getElementById('texto-ganador').innerText = "No se encontraron datos de la partida.";
            }
        }

        function descargarRegistro() {
            if (!datosPartida) return;

            // Armamos el texto del archivo
            const fecha = new Date().toLocaleString('es-AR');
            const contenido = `=================================\n` +
                              `   LEGADO ASYMMETRIC CHESS       \n` +
                              `=================================\n\n` +
                              `Fecha de batalla: ${fecha}\n\n` +
                              `Jugador 1 (Abajo): ${datosPartida.j1.toUpperCase()}\n` +
                              `Jugador 2 (Arriba): ${datosPartida.j2.toUpperCase()}\n\n` +
                              `>>> GANADOR: JUGADOR ${datosPartida.ganador} <<<\n\n` +
                              `=================================`;

            // Magia oscura de Javascript para crear y descargar un archivo .txt
            const blob = new Blob([contenido], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            
            // Nombre del archivo generado dinámicamente
            a.download = `Legado_J1_${datosPartida.j1}_vs_J2_${datosPartida.j2}_GanadorJ${datosPartida.ganador}.txt`;
            a.href = url;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
