<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Victoria! - Legado Asimétrico</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0b0c10; color: #c5c6c7;
            font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px; text-align: center;
            background-image: radial-gradient(circle at center, #1a1d24 0%, #0b0c10 100%);
        }
        
        /* Ajuste responsivo del logo */
        .logo { max-width: 80%; width: 300px; margin-bottom: 10px; height: auto; }
        
        .titulo-victoria {
            font-family: 'Cinzel', serif;
            font-size: clamp(2rem, 8vw, 4rem); /* El tamaño se ajusta según la pantalla */
            color: #c5a059;
            text-shadow: 0 0 20px rgba(197, 160, 89, 0.5);
            margin: 10px 0;
        }

        .subtitulo { font-size: 1.2rem; color: #f39c12; margin-bottom: 20px; padding: 0 10px; }

        /* Contenedor responsivo: cambia el tamaño fijo por máximo relativo */
        .contenedor-imagen {
            width: 90%;
            max-width: 400px;
            aspect-ratio: 1 / 1; /* Mantiene el cuadrado perfecto */
            background-color: #0b0c10;
            border: 3px solid #c5a059; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 30px; overflow: hidden;
        }
        
        .contenedor-imagen img { 
            max-width: 90%; max-height: 90%; object-fit: contain; 
        }

        .botones { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; }
        
        .btn {
            padding: 15px 30px; font-size: 1.1rem; border: none; border-radius: 6px;
            cursor: pointer; font-weight: bold; text-decoration: none; display: inline-block;
        }
        .btn-menu { background-color: #3498db; color: white; }
    </style>
</head>
<body>

    <!-- Asegúrate que el nombre sea EXACTAMENTE igual al del archivo en tu repo -->
    <img src="LogoSolo.PNG" alt="Legado Asymmetric Chess" class="logo">
    
    <h1 class="titulo-victoria">¡VICTORIA!</h1>
    <div class="subtitulo" id="texto-ganador">Cargando resultado...</div>

    <div class="contenedor-imagen">
        <img id="img-ganador" src="" alt="Faccion Ganadora">
    </div>

    <div class="botones">
        <a href="seleccion.html" class="btn btn-menu">Volver al Menú</a>
    </div>

    <script>
        let datosPartida = null;
        window.onload = function() {
            const datosGuardados = localStorage.getItem('resultadoPartida');
            if (datosGuardados) {
                datosPartida = JSON.parse(datosGuardados);
                document.getElementById('texto-ganador').innerText = 
                    `¡EL JUGADOR ${datosPartida.ganador} HA DOMINADO EL CAMPO DE BATALLA!`;
                document.getElementById('img-ganador').src = datosPartida.imgGanador;
            } else {
                document.getElementById('texto-ganador').innerText = "No se encontraron datos.";
            }
        }
    </script>
</body>
</html>
